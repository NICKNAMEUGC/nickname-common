name: Verify
on:
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          pip install -e .
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
